spring.application.name=ms-cliente

# Base de datos independiente para este microservicio
spring.datasource.url=jdbc:mariadb://localhost:3307/microservicio_clientes
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Puerto diferente para que no choque con los otros (8080 y 8081)
server.port=8082